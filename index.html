<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Campus Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #22d3ee, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            color: transparent;
        }

        .search-box {
            width: 400px;
            padding: 15px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 10px 25px;
            border-radius: 25px;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
        }
    </style>

</head>

<body class="flex flex-col items-center justify-center h-screen text-center">

    <h1 class="title">Welcome to Smart Campus Finder</h1>

    <form action="/dashboard" method="POST" class="mt-8">
        <input name="college" type="text" placeholder="Enter College Name..." class="search-box text-black">
        <br>
        <button type="submit" class="btn mt-4">Search</button>

        <!-- BOTTOM TEXT -->
        <p class="mt-8 max-w-xl text-gray-300 text-center">
            Discover food, rooms, hospitals, police stations and transport facilities around your college.
        </p>
    </form>

</body>

</html>
